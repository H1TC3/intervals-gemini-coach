name: Codzienny Trener AI Intervals.icu

on:
  schedule:
    # 05:00 UTC to 07:00 rano czasu letniego w Polsce (CEST)
    - cron: '0 5 * * *'
  workflow_dispatch: # Umożliwia ręczne uruchomienie przyciskiem

jobs:
  run-coach:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Pozwala skryptowi zapisywać pliki

    steps:
    - name: Pobranie kodu repozytorium
      uses: actions/checkout@v4

    - name: Konfiguracja Pythona
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalacja bibliotek
      run: |
        python -m pip install --upgrade pip
        pip install requests google-genai

    - name: Uruchomienie skryptu trenera AI
      env:
        INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
        INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python coach.py

    - name: Zapisz wygenerowany raport do repozytorium
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        # Dodajemy zarówno folder raporty, jak i dane
        git add raporty/* dane/*
        git commit -m "Dodano codzienny raport trenera AI $(date +'%Y-%m-%d')" || exit 0
        git push
