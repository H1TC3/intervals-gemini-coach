name: Codzienny Trener AI Intervals.icu

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: 

jobs:
  run-coach:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      issues: write   

    steps:
    - name: Pobranie kodu repozytorium
      uses: actions/checkout@v4

    - name: Konfiguracja Pythona
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalacja bibliotek
      run: |
        python -m pip install --upgrade pip
        pip install requests google-genai

    - name: Uruchomienie skryptu trenera AI
      env:
        INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
        INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: python coach.py
